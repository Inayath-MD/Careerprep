version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: careerprep-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Inayath5196
      MYSQL_DATABASE: careerprep
    ports:
      - "3307:3306"

  backend:
    build: 
      context: ./careerprep
    container_name: careerprep-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    extra_hosts:
      - "host.docker.internal:host-gateway"

  rag:
    build:
      context: ./Rag
    container_name: careerprep-rag
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:8080
    container_name: careerprep-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
